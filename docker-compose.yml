services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/static/uploads
      - ./backups:/app/backups
    restart: unless-stopped

  forecast-sync:
    profiles: ["forecast-sync"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/forecast_sync_worker.py"]
    env_file:
      - .env
    environment:
      FORECAST_SOURCE_PATH: ${FORECAST_SOURCE_PATH:-/forecast_source/1.FORCASE CENTOR.xlsx}
      FORECAST_SYNC_INTERVAL_SECONDS: ${FORECAST_SYNC_INTERVAL_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./forecast_source:/forecast_source:ro
    restart: unless-stopped

  db:
    image: mariadb:11.4
    ports:
    - "127.0.0.1:3307:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
